services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    env_file:
      - ./.env
    ports:
      - "8081:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    env_file:
      - ./.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - web
